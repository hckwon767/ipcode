name: 🔄 Auto Update Proxy List (6 Hours)

on:
  # 6시간마다 실행 (0, 6, 12, 18시 UTC)
  schedule:
    - cron: '0 */6 * * *' 
  # 수동 실행을 위한 워크플로우 디스패치
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    # GITHUB_TOKEN이 쓰기 권한을 가지도록 설정
    permissions:
      contents: write
      
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        
      - name: 🐍 Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run Proxy Update Script
        run: python update_proxy.py

      - name: 🚀 Run Alive IP Update Script
        run: python aliveip.py

      - name: 💾 Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          # 두 파일 모두 커밋 대상에 포함
          file_pattern: 'cfproxy.txt aliveip.txt' 
          commit_message: "🤖 Feat: cfproxy.txt 및 aliveip.txt 자동 업데이트"
          
          # 파일 변경 여부를 확인하여 커밋
          skip_dirty_check: false
